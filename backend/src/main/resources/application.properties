spring.datasource.url=jdbc:postgresql://localhost:5433/ai_system
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

server.port=8080

app.jwt.secret=finmentor-ai-secret-key-2026-production-change-me
app.jwt.expiration=86400000

ai.service.url=http://localhost:8000
ai.service.timeout=60000

file.upload.dir=uploads/

logging.level.org.apache.fontbox=ERROR
logging.level.org.apache.pdfbox=ERROR
spring.jpa.open-in-view=false
