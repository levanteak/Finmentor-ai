spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:ai_system}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

server.port=8080

app.jwt.secret=${APP_JWT_SECRET:finmentor-local-dev-secret-key-must-be-32-chars}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
ai.service.timeout=60000

synergy.url=${SYNERGY_URL:http://192.168.7.62:8080}

file.upload.dir=uploads/

logging.level.org.apache.fontbox=ERROR
logging.level.org.apache.pdfbox=ERROR
spring.jpa.open-in-view=false
